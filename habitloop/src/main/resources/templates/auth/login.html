<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HabitLoop - Đăng nhập</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">🔥</div>
            <div class="auth-title">HabitLoop</div>
            <div class="auth-sub">Đăng nhập để tiếp tục</div>
        </div>

        <div th:if="${success}" class="alert alert-success">
            <i class="ti ti-check"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <i class="ti ti-alert-circle"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post">
            <div class="form-group">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" th:field="*{username}" class="form-control"
                       placeholder="Nhập tên đăng nhập">
                <div th:if="${#fields.hasErrors('username')}"
                     style="color:#dc2626; font-size:12px; margin-top:4px;"
                     th:errors="*{username}"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Mật khẩu</label>
                <input type="password" th:field="*{password}" class="form-control"
                       placeholder="Nhập mật khẩu">
                <div th:if="${#fields.hasErrors('password')}"
                     style="color:#dc2626; font-size:12px; margin-top:4px;"
                     th:errors="*{password}"></div>
            </div>
            <button type="submit" class="btn-primary"
                    style="width:100%; justify-content:center; padding:11px; margin-top:4px;">
                <i class="ti ti-login"></i> Đăng nhập
            </button>
        </form>

        <div style="text-align:center; margin-top:20px; font-size:13.5px; color:#71717a;">
            Chưa có tài khoản?
            <a th:href="@{/auth/register}"
               style="color:#6366f1; font-weight:500; text-decoration:none;">Đăng ký ngay</a>
        </div>
    </div>
</div>
</body>
</html>
