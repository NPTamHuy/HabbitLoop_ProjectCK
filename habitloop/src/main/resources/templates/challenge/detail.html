<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HabitLoop - Challenge Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { background: #f0f2ff; }
        .navbar { background: #6366f1 !important; }
        .brand { color: white; font-weight: 700; font-size: 1.3rem; }
        .card { border-radius: 16px; border: none; box-shadow: 0 2px 16px rgba(99,102,241,0.08); }
        .btn-primary { background: #6366f1; border-color: #6366f1; }
        .rank-1 { color: #f59e0b; font-weight: 700; }
        .rank-2 { color: #94a3b8; font-weight: 700; }
        .rank-3 { color: #b45309; font-weight: 700; }
        .feed-item { border-left: 3px solid #6366f1; padding-left: 12px; margin-bottom: 8px; }
        .badge-code { background: #eef2ff; color: #6366f1; font-family: monospace;
                      padding: 2px 8px; border-radius: 6px; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${message}" class="alert alert-warning" th:text="${message}"></div>

    <!-- Header -->
    <div class="card p-4 mb-4">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h4 class="fw-bold" th:text="${challenge.title}"></h4>
                <p class="text-muted" th:text="${challenge.description}"></p>
                <span class="small">📅
                    <span th:text="${challenge.startDate}"></span> →
                    <span th:text="${challenge.endDate}"></span>
                </span>
            </div>
            <div class="text-end">
                <div class="small text-muted">Mã mời</div>
                <span class="badge-code fs-5" th:text="${challenge.inviteCode}"></span>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Leaderboard -->
        <div class="col-md-5">
            <div class="card p-4">
                <h6 class="fw-bold mb-3">🏆 Leaderboard</h6>
                <div id="leaderboard">
                    <div th:each="cm, stat : ${leaderboard}"
                         class="d-flex justify-content-between align-items-center mb-2 p-2"
                         style="border-radius:8px; background:#f8f9ff;">
                        <div>
                            <span th:class="${stat.index == 0 ? 'rank-1' : stat.index == 1 ? 'rank-2' : stat.index == 2 ? 'rank-3' : ''}"
                                  th:text="${stat.index + 1} + '. '"></span>
                            <span th:text="${cm.user.username}"></span>
                        </div>
                        <span class="badge bg-primary"
                              th:text="${cm.totalCheckins} + ' check-ins'"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Check-in + Feed -->
        <div class="col-md-7">
            <!-- Check-in form -->
            <div class="card p-4 mb-4">
                <h6 class="fw-bold mb-3">✅ Check-in hôm nay</h6>
                <form th:action="@{/challenges/{id}/checkin(id=${challenge.id})}"
                      method="post">
                    <select name="habitId" class="form-select mb-2">
                        <option th:each="h : ${myHabits}"
                                th:value="${h.id}"
                                th:text="${h.icon} + ' ' + ${h.name}"></option>
                    </select>
                    <button type="submit" class="btn btn-primary w-100">
                        Check-in 🔥
                    </button>
                </form>
            </div>

            <!-- Activity Feed -->
            <div class="card p-4">
                <h6 class="fw-bold mb-3">📢 Hoạt động</h6>
                <div th:if="${activityFeed.empty}" class="text-muted small">
                    Chưa có hoạt động nào.
                </div>
                <div th:each="feed : ${activityFeed}" class="feed-item">
                    <div class="small" th:text="${feed.message}"></div>
                    <div class="text-muted" style="font-size:0.75rem;"
                         th:text="${feed.createdAt}"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- WebSocket: realtime leaderboard -->
<script th:inline="javascript">
    const challengeId = /*[[${challenge.id}]]*/ 0;

    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, function() {
        stompClient.subscribe('/topic/challenge/' + challengeId + '/leaderboard',
            function(message) {
                const data = JSON.parse(message.body);
                let html = '';
                data.forEach(function(cm, index) {
                    const rankClass = index === 0 ? 'rank-1' :
                                      index === 1 ? 'rank-2' :
                                      index === 2 ? 'rank-3' : '';
                    html += '<div class="d-flex justify-content-between align-items-center mb-2 p-2" style="border-radius:8px; background:#f8f9ff;">';
                    html += '<div><span class="' + rankClass + '">' + (index+1) + '. </span>';
                    html += cm.user.username + '</div>';
                    html += '<span class="badge bg-primary">' + cm.totalCheckins + ' check-ins</span>';
                    html += '</div>';
                });
                document.getElementById('leaderboard').innerHTML = html;
            }
        );
    });
</script>
</body>
</html>
