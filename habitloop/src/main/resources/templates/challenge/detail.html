<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HabitLoop - Challenge Detail</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/navbar :: sidebar}" th:with="activePage='challenges'"></div>

    <main class="main-content">
        <div class="topbar">
            <div>
                <div class="page-title" th:text="${challenge.title}"></div>
                <div class="page-subtitle">
                    <span th:text="${challenge.startDate}"></span> →
                    <span th:text="${challenge.endDate}"></span>
                </div>
            </div>
            <div class="topbar-right">
                <div class="notif-wrapper">
                    <button class="bell-btn" id="bell-btn">
                        <i class="ti ti-bell"></i>
                        <div class="bell-dot" id="notif-badge" style="display:none;"></div>
                    </button>
                    <div class="notif-dropdown" id="notif-dropdown">
                        <div class="notif-header">
                            <span>Thông báo</span>
                            <form th:action="@{/notifications/read-all}" method="post">
                                <button type="submit" class="notif-read-btn">Đọc tất cả</button>
                            </form>
                        </div>
                        <div id="notif-list"></div>
                    </div>
                </div>
                <div style="font-size:13px; color:var(--color-text-secondary);">
                    Mã mời: <span style="font-family:monospace; font-weight:700; color:#6366f1;
                                         background:#eef2ff; padding:3px 10px; border-radius:6px;"
                                  th:text="${challenge.inviteCode}"></span>
                </div>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success">
            <i class="ti ti-check"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${message}" class="alert alert-info">
            <i class="ti ti-info-circle"></i> <span th:text="${message}"></span>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1.4fr; gap:20px;">

            <!-- Leaderboard -->
            <div class="card">
                <div class="card-title">Leaderboard</div>
                <div id="leaderboard">
                    <div th:each="cm, stat : ${leaderboard}" class="leaderboard-item">
                        <div class="rank-num"
                             th:class="${stat.index == 0 ? 'rank-num rank-1' : stat.index == 1 ? 'rank-num rank-2' : stat.index == 2 ? 'rank-num rank-3' : 'rank-num'}"
                             th:text="${stat.index + 1}"></div>
                        <div style="flex:1; font-size:14px; font-weight:500;"
                             th:text="${cm.user.username}"></div>
                        <span class="badge badge-purple"
                              th:text="${cm.totalCheckins} + ' check-ins'"></span>
                    </div>
                    <div th:if="${leaderboard.empty}" class="empty-state" style="padding:24px;">
                        <div class="empty-state-text">Chưa có thành viên nào check-in</div>
                    </div>
                </div>
            </div>

            <!-- Phải: Check-in + Feed -->
            <div>
                <!-- Check-in -->
					<div class="card" style="margin-bottom:20px;">
					    <div class="card-title">Check-in hôm nay</div>
					    <p style="font-size:13px; color:var(--color-text-secondary); margin-bottom:12px;">
					        Xác nhận bạn đã hoàn thành mục tiêu hôm nay trong challenge này.
					    </p>
					    <form th:action="@{/challenges/{id}/checkin(id=${challenge.id})}" method="post">
					        <input type="hidden" name="habitId" value="0"/>
					        <button type="submit" class="btn-primary"
					                style="width:100%; justify-content:center; padding:10px;">
					            <i class="ti ti-flame"></i> Check-in hôm nay
					        </button>
					    </form>
					</div>
                </div>

                <!-- Activity Feed -->
                <div class="card">
                    <div class="card-title">Hoạt động gần đây</div>
                    <div th:if="${activityFeed.empty}" class="empty-state" style="padding:24px;">
                        <div class="empty-state-text">Chưa có hoạt động nào</div>
                    </div>
                    <div th:each="feed : ${activityFeed}" class="feed-item">
                        <div class="feed-dot"></div>
                        <div>
                            <div class="feed-msg" th:text="${feed.message}"></div>
                            <div class="feed-time" th:text="${feed.createdAt}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:inline="javascript">
    const challengeId = /*[[${challenge.id}]]*/ 0;
    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);
    stompClient.connect({}, function() {
        stompClient.subscribe('/topic/challenge/' + challengeId + '/leaderboard',
            function(message) {
                const data = JSON.parse(message.body);
                let html = '';
                data.forEach(function(cm, index) {
                    const rankClass = index === 0 ? 'rank-num rank-1' :
                                      index === 1 ? 'rank-num rank-2' :
                                      index === 2 ? 'rank-num rank-3' : 'rank-num';
                    html += '<div class="leaderboard-item">';
                    html += '<div class="' + rankClass + '">' + (index+1) + '</div>';
                    html += '<div style="flex:1;font-size:14px;font-weight:500;">' + cm.username + '</div>';
                    html += '<span class="badge badge-purple">' + cm.totalCheckins + ' check-ins</span>';
                    html += '</div>';
                });
                document.getElementById('leaderboard').innerHTML = html || '<div class="empty-state" style="padding:24px;"><div class="empty-state-text">Chưa có check-in</div></div>';
            }
        );
    });
</script>

<script>
let notifOpen = false;
window.addEventListener('load', function() {
    fetch('/notifications/api').then(r => r.json()).then(data => {
        if (data.unreadCount > 0) document.getElementById('notif-badge').style.display = 'block';
    }).catch(() => {});
    document.getElementById('bell-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        notifOpen = !notifOpen;
        document.getElementById('notif-dropdown').style.display = notifOpen ? 'block' : 'none';
        if (notifOpen) {
            fetch('/notifications/api').then(r => r.json()).then(data => {
                const list = document.getElementById('notif-list');
                if (!data.notifications.length) {
                    list.innerHTML = '<div style="padding:20px;text-align:center;color:#a1a1aa;font-size:13px;">Không có thông báo</div>';
                    return;
                }
                list.innerHTML = data.notifications.map(n => `
                    <div class="notif-item ${n.isRead ? '' : 'unread'}">
                        <div class="notif-msg">${n.message}</div>
                        <div class="notif-time">${n.createdAt.substring(0,16).replace('T',' ')}</div>
                    </div>`).join('');
            }).catch(() => {});
        }
    });
    document.addEventListener('click', function(e) {
        if (!document.getElementById('notif-dropdown').contains(e.target) &&
            !document.getElementById('bell-btn').contains(e.target)) {
            notifOpen = false;
            document.getElementById('notif-dropdown').style.display = 'none';
        }
    });
});
</script>
</body>
</html>
