<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HabitLoop - Challenges</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/navbar :: sidebar}" th:with="activePage='challenges'"></div>

    <main class="main-content">
        <div class="topbar">
            <div>
                <div class="page-title">Challenges</div>
                <div class="page-subtitle">Thi đua cùng bạn bè, duy trì động lực</div>
            </div>
            <div class="topbar-right">
                <div class="notif-wrapper">
                    <button class="bell-btn" id="bell-btn">
                        <i class="ti ti-bell"></i>
                        <div class="bell-dot" id="notif-badge" style="display:none;"></div>
                    </button>
                    <div class="notif-dropdown" id="notif-dropdown">
                        <div class="notif-header">
                            <span>Thông báo</span>
                            <form th:action="@{/notifications/read-all}" method="post">
                                <button type="submit" class="notif-read-btn">Đọc tất cả</button>
                            </form>
                        </div>
                        <div id="notif-list"></div>
                    </div>
                </div>
                <a href="/challenges/create" class="btn-primary">
                    <i class="ti ti-plus"></i> Tạo challenge
                </a>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success">
            <i class="ti ti-check"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${message}" class="alert alert-info">
            <i class="ti ti-info-circle"></i> <span th:text="${message}"></span>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 300px; gap:20px;">
            <div>
                <div style="font-size:14px; font-weight:600; margin-bottom:12px;">Challenge của tôi</div>
                <div th:if="${myChallenges.empty}" class="card">
                    <div class="empty-state" style="padding:32px;">
                        <div class="empty-state-icon">🏆</div>
                        <div class="empty-state-text">Bạn chưa tham gia challenge nào</div>
                    </div>
                </div>
                <div th:each="c : ${myChallenges}" class="card" style="margin-bottom:12px; padding:16px 20px;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <div style="font-size:15px; font-weight:600;" th:text="${c.title}"></div>
                            <div style="font-size:13px; color:#71717a; margin-top:3px;" th:text="${c.description}"></div>
                            <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                                <span class="badge badge-purple">
                                    <i class="ti ti-calendar"></i>
                                    <span th:text="${c.startDate} + ' → ' + ${c.endDate}"></span>
                                </span>
                                <span style="font-family:monospace; font-size:13px; font-weight:700;
                                             color:#6366f1; background:#eef2ff; padding:3px 10px;
                                             border-radius:6px;" th:text="${c.inviteCode}"></span>
                            </div>
                        </div>
                        <a th:href="@{/challenges/{id}(id=${c.id})}" class="btn-secondary" style="flex-shrink:0;">
                            Xem <i class="ti ti-arrow-right"></i>
                        </a>
                    </div>
                </div>

                <div style="font-size:14px; font-weight:600; margin:20px 0 12px;">Challenge công khai 🌍</div>
                <div th:if="${publicChallenges.empty}" class="card">
                    <div class="empty-state" style="padding:32px;">
                        <div class="empty-state-text">Không có challenge công khai nào</div>
                    </div>
                </div>
                <div th:each="c : ${publicChallenges}" class="card" style="margin-bottom:12px; padding:16px 20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-size:15px; font-weight:600;" th:text="${c.title}"></div>
                            <div style="font-size:13px; color:#71717a; margin-top:3px;" th:text="${c.description}"></div>
                            <span class="badge badge-purple" style="margin-top:8px; display:inline-flex;">
                                <i class="ti ti-calendar"></i>
                                <span th:text="${c.startDate} + ' → ' + ${c.endDate}"></span>
                            </span>
                        </div>
                        <a th:href="@{/challenges/{id}(id=${c.id})}" class="btn-secondary">
                            Xem <i class="ti ti-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Join by code -->
            <div>
                <div class="card">
                    <div class="card-title">Tham gia bằng mã mời</div>
                    <form th:action="@{/challenges/join}" method="post">
                        <div class="form-group">
                            <input type="text" name="inviteCode" class="form-control"
                                   placeholder="Nhập mã 6 ký tự" maxlength="6"
                                   style="text-transform:uppercase; letter-spacing:4px; font-weight:700; text-align:center; font-size:16px;">
                        </div>
                        <button type="submit" class="btn-primary" style="width:100%; justify-content:center;">
                            <i class="ti ti-login"></i> Tham gia
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
<script>
let notifOpen = false;
window.addEventListener('load', function() {
    fetch('/notifications/api').then(r => r.json()).then(data => {
        if (data.unreadCount > 0) document.getElementById('notif-badge').style.display = 'block';
    }).catch(() => {});
    document.getElementById('bell-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        notifOpen = !notifOpen;
        document.getElementById('notif-dropdown').style.display = notifOpen ? 'block' : 'none';
        if (notifOpen) {
            fetch('/notifications/api').then(r => r.json()).then(data => {
                const list = document.getElementById('notif-list');
                if (!data.notifications.length) {
                    list.innerHTML = '<div style="padding:20px;text-align:center;color:#a1a1aa;font-size:13px;">Không có thông báo</div>';
                    return;
                }
                list.innerHTML = data.notifications.map(n => `
                    <div class="notif-item ${n.isRead ? '' : 'unread'}">
                        <div class="notif-msg">${n.message}</div>
                        <div class="notif-time">${n.createdAt.substring(0,16).replace('T',' ')}</div>
                    </div>`).join('');
            }).catch(() => {});
        }
    });
    document.addEventListener('click', function(e) {
        if (!document.getElementById('notif-dropdown').contains(e.target) &&
            !document.getElementById('bell-btn').contains(e.target)) {
            notifOpen = false;
            document.getElementById('notif-dropdown').style.display = 'none';
        }
    });
});
</script>
</body>
</html>
